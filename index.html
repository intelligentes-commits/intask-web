<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a84ff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="intask">
<title>intask</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%230a84ff'/%3E%3Cpath d='M52 94l26 26 50-60' fill='none' stroke='white' stroke-width='15' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
<style>
  :root{
    --bg:#f6f5f1; --card:#ffffff; --ink:#1c1d21; --muted:#6b6d76; --faint:#9a9ca4;
    --accent:#0a84ff; --sep:#e7e6e1; --danger:#e5484d; --done:#8a8c94;
    --radius:14px; --pad:16px;
    --safe-top:env(safe-area-inset-top); --safe-bot:env(safe-area-inset-bottom);
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#111318; --card:#1a1d24; --ink:#e9eaee; --muted:#9a9ca4; --faint:#6b6d76;
           --accent:#3aa0ff; --sep:#262a33; --done:#6b6d76; }
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; }
  body{
    background:var(--bg); color:var(--ink); font:16px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    letter-spacing:-0.01em; -webkit-font-smoothing:antialiased;
  }
  button{ font:inherit; color:inherit; border:none; background:none; cursor:pointer; }
  input{ font:inherit; color:inherit; }
  .hidden{ display:none !important; }

  /* --- Connect screen --- */
  #connect{ max-width:440px; margin:0 auto; padding:calc(var(--safe-top) + 40px) var(--pad) var(--pad); }
  #connect h1{ font-size:28px; font-weight:700; letter-spacing:-0.03em; margin:0 0 4px; }
  #connect p{ color:var(--muted); margin:0 0 24px; }
  .field{ margin-bottom:14px; }
  .field label{ display:block; font-size:13px; color:var(--muted); margin-bottom:6px; }
  .field input{
    width:100%; padding:12px 14px; background:var(--card); border:1px solid var(--sep);
    border-radius:12px; outline:none;
  }
  .field input:focus{ border-color:var(--accent); }
  .btn{
    width:100%; padding:13px; background:var(--accent); color:#fff; border-radius:12px;
    font-weight:600; margin-top:8px;
  }
  .btn.ghost{ background:transparent; color:var(--accent); border:1px solid var(--sep); }
  .hint{ font-size:12px; color:var(--faint); margin-top:16px; line-height:1.5; }
  .hint a{ color:var(--accent); }
  .err{ color:var(--danger); font-size:13px; margin-top:10px; min-height:18px; }

  /* --- App --- */
  #app{ max-width:640px; margin:0 auto; padding-bottom:calc(var(--safe-bot) + 96px); }
  header.top{
    position:sticky; top:0; background:var(--bg); z-index:5;
    padding:calc(var(--safe-top) + 12px) var(--pad) 10px;
    display:flex; align-items:center; gap:10px; border-bottom:1px solid var(--sep);
  }
  header.top .logo{ width:26px;height:26px;border-radius:8px;background:var(--accent);color:#fff;
    display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700; }
  header.top .title{ font-weight:700; font-size:19px; letter-spacing:-0.02em; flex:1; }
  header.top .cnt{ color:var(--faint); font-weight:600; font-size:15px; }
  header.top button.icon{ color:var(--muted); font-size:18px; padding:6px; }

  .lists{ display:flex; gap:8px; overflow-x:auto; padding:10px var(--pad); scrollbar-width:none; }
  .lists::-webkit-scrollbar{ display:none; }
  .chip{ white-space:nowrap; padding:7px 14px; border-radius:999px; background:var(--card);
    border:1px solid var(--sep); color:var(--muted); font-size:14px; font-weight:500; }
  .chip.active{ background:var(--accent); color:#fff; border-color:var(--accent); }

  ul.tasks{ list-style:none; margin:0; padding:6px var(--pad) 0; }
  li.task{ display:flex; align-items:center; gap:6px; padding:8px 4px;
    border-bottom:1px solid var(--sep); }
  /* 40px тап-цель, кружок 22px внутри (комфортно для пальца) */
  li.task .box{ flex:0 0 auto; width:40px;height:40px; display:flex; align-items:center;
    justify-content:center; position:relative; }
  li.task .box::before{ content:""; width:22px;height:22px;border-radius:50%;
    border:2px solid var(--faint); transition:.15s; }
  li.task.done .box::before{ background:var(--accent); border-color:var(--accent); }
  li.task.done .box::after{ content:"✓"; position:absolute; color:#fff; font-size:13px; }
  li.task .t{ flex:1; min-width:0; padding:5px 0; }
  li.task .name{ word-break:break-word; }
  li.task.done .name{ color:var(--done); text-decoration:line-through; }
  li.task .meta{ font-size:12px; color:var(--faint); margin-top:2px; display:flex; gap:10px; }
  li.task .meta .flag{ color:var(--accent); }
  li.task .meta .prio{ color:var(--danger); font-weight:700; }
  li.task .name .srclist{ color:var(--faint); font-weight:400; font-size:13px; }
  .sec{ padding:18px var(--pad) 4px; font-size:12px; font-weight:700; letter-spacing:0.06em;
    color:var(--faint); text-transform:uppercase; }
  .empty{ text-align:center; color:var(--faint); padding:60px var(--pad); }

  /* Add bar */
  .addbar{ position:fixed; left:0; right:0; bottom:0; background:var(--bg);
    padding:10px var(--pad) calc(var(--safe-bot) + 10px); border-top:1px solid var(--sep);
    display:flex; gap:10px; max-width:640px; margin:0 auto; }
  .addbar input{ flex:1; padding:12px 14px; background:var(--card); border:1px solid var(--sep);
    border-radius:999px; outline:none; }
  .addbar input:focus{ border-color:var(--accent); }
  .addbar button{ width:44px; height:44px; border-radius:50%; background:var(--accent); color:#fff;
    font-size:22px; flex:0 0 auto; }
  .addbar button:disabled{ opacity:.4; }

  /* Лист задачи */
  .overlay{ position:fixed; inset:0; background:rgba(0,0,0,.35); opacity:0; pointer-events:none;
    transition:.2s; z-index:30; }
  .overlay.show{ opacity:1; pointer-events:auto; }
  .sheet{ position:fixed; left:0; right:0; bottom:0; background:var(--card);
    border-radius:20px 20px 0 0; padding:8px var(--pad) calc(var(--safe-bot) + 20px);
    transform:translateY(110%); transition:transform .25s cubic-bezier(.2,.8,.2,1);
    z-index:31; max-width:640px; margin:0 auto; box-shadow:0 -8px 40px rgba(0,0,0,.22); }
  .sheet.show{ transform:translateY(0); }
  .sheet .grab{ width:38px;height:4px;border-radius:2px;background:var(--sep);margin:6px auto 14px; }
  .sheet .title-in{ width:100%; font-size:20px; font-weight:600; border:none; background:none;
    outline:none; color:var(--ink); padding:2px 0 12px; border-bottom:1px solid var(--sep); margin-bottom:6px; }
  .row{ display:flex; align-items:center; gap:10px; padding:12px 0; border-bottom:1px solid var(--sep); }
  .row .lbl{ flex:1; color:var(--muted); }
  .row input[type=date]{ background:var(--bg); border:1px solid var(--sep); border-radius:9px;
    padding:7px 10px; color:var(--ink); outline:none; }
  .seg{ display:flex; gap:6px; }
  .seg button{ padding:7px 12px; border-radius:9px; background:var(--bg); border:1px solid var(--sep);
    font-size:14px; min-width:38px; }
  .seg button.on{ background:var(--accent); color:#fff; border-color:var(--accent); }
  .del{ width:100%; padding:13px; color:var(--danger); font-weight:600; margin-top:18px;
    border:1px solid var(--sep); border-radius:12px; }

  .toast{ position:fixed; left:50%; bottom:90px; transform:translateX(-50%);
    background:var(--ink); color:var(--bg); padding:10px 16px; border-radius:999px; font-size:14px;
    opacity:0; transition:.2s; pointer-events:none; z-index:20; max-width:90%; }
  .toast.show{ opacity:.95; }
  .spinner{ text-align:center; color:var(--faint); padding:40px; }
</style>
</head>
<body>

<!-- Экран подключения -->
<section id="connect">
  <h1>intask</h1>
  <p>Задачи из твоего приватного GitHub-репозитория.</p>
  <div class="field"><label>Владелец/репозиторий (owner/repo)</label>
    <input id="in-repo" placeholder="username/reminders" autocapitalize="off" autocorrect="off"></div>
  <div class="field"><label>Ветка</label>
    <input id="in-branch" placeholder="main" value="main" autocapitalize="off"></div>
  <div class="field"><label>Personal Access Token (repo scope)</label>
    <input id="in-token" type="password" placeholder="ghp_…" autocapitalize="off" autocorrect="off"></div>
  <button class="btn" id="btn-connect">Подключиться</button>
  <button class="btn ghost" id="btn-demo">Демо (без токена)</button>
  <div class="err" id="connect-err"></div>
  <div class="hint">
    Токен хранится только в этом браузере (localStorage) и уходит напрямую в GitHub API.
    Создать: GitHub → Settings → Developer settings → Fine-grained token с доступом
    Contents (read/write) к репозиторию.
  </div>
</section>

<!-- Приложение -->
<section id="app" class="hidden">
  <header class="top">
    <div class="logo">✓</div>
    <div class="title" id="app-title">Входящие</div>
    <div class="cnt" id="app-count"></div>
    <button class="icon" id="btn-refresh" title="Обновить">⟳</button>
    <button class="icon" id="btn-logout" title="Выйти">⎋</button>
  </header>
  <div class="lists" id="lists"></div>
  <div id="list-body"></div>
</section>

<div class="addbar hidden" id="addbar">
  <input id="add-input" placeholder="Новая задача" enterkeyhint="done">
  <button id="add-btn" disabled>＋</button>
</div>

<div class="toast" id="toast"></div>

<!-- Экран задачи (лист снизу) -->
<div class="overlay" id="overlay"></div>
<div class="sheet" id="sheet">
  <div class="grab"></div>
  <input class="title-in" id="d-title" placeholder="Название">
  <div class="row"><div class="lbl">Приоритет</div>
    <div class="seg" id="d-prio">
      <button data-v="0">—</button><button data-v="1">!</button>
      <button data-v="2">!!</button><button data-v="3">!!!</button>
    </div></div>
  <div class="row"><div class="lbl">Флажок</div>
    <div class="seg"><button id="d-flag">⚑</button></div></div>
  <div class="row"><div class="lbl">Срок</div>
    <div class="seg" id="d-due">
      <button data-d="0">Сегодня</button><button data-d="1">Завтра</button>
      <button data-d="-1">Убрать</button>
    </div></div>
  <div class="row"><div class="lbl">Дата</div>
    <input type="date" id="d-date"></div>
  <button class="del" id="d-del">Удалить в корзину</button>
</div>

<script>
"use strict";
// ===========================================================================
// intask web (PWA) — читает/пишет тот же формат, что Windows-клиент:
// файл-имя = [~]{хэши родителей}_{свой хэш}_{название}.toml, ~ = выполнено,
// _-префикс = служебный. GitHub-репо = хаб синхронизации.
// ===========================================================================

const LS = "intask.cfg";
let cfg = null;         // {repo, branch, token}  (token отсутствует в demo)
let demo = false;
let model = null;       // {lists:[{name,path,order,tasks:[...]}], curList}
let mock = null;        // demo-данные (изменяемые в памяти)

const $ = s => document.querySelector(s);
const el = (t, c, txt) => { const e=document.createElement(t); if(c)e.className=c; if(txt!=null)e.textContent=txt; return e; };
const toast = (m) => { const t=$("#toast"); t.textContent=m; t.classList.add("show"); clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove("show"),1800); };

// --- Разбор имени файла задачи ---
function parseTaskFilename(fname){
  if(!fname.endsWith(".toml")) return null;
  let name = fname.slice(0, -5);
  if(name.startsWith("_")) return null;         // служебный файл
  let done = false;
  if(name.startsWith("~")){ done = true; name = name.slice(1); }
  const toks = name.split("_");
  const hashes = [];
  let i = 0;
  while(i < toks.length && /^[0-9a-f]{6}$/.test(toks[i])){ hashes.push(toks[i]); i++; }
  if(hashes.length === 0) return null;
  const title = toks.slice(i).join("_");
  return { done, parents: hashes.slice(0,-1), hash: hashes[hashes.length-1], title };
}

// --- Разбор полей TOML (по мере необходимости) ---
function parseTaskToml(text){
  const out = { due:null, priority:0, flagged:false };
  if(!text) return out;
  for(const raw of text.split(/\r?\n/)){
    const line = raw.trim();
    if(line.startsWith("[")) break;             // [[comment]] и т.п.
    const eq = line.indexOf("=");
    if(eq < 0) continue;
    const k = line.slice(0,eq).trim(), v = line.slice(eq+1).trim().replace(/^"|"$/g,"");
    if(k==="due") out.due = v || null;
    else if(k==="priority") out.priority = parseInt(v)||0;
    else if(k==="flagged") out.flagged = v==="true";
  }
  return out;
}

// --- Массив в _list.toml: order = ["a1b2c3", ...] ---
function parseStringArray(text, key){
  if(!text) return [];
  const m = text.match(new RegExp("^\\s*"+key+"\\s*=\\s*\\[([^\\]]*)\\]","m"));
  if(!m) return [];
  return [...m[1].matchAll(/"([^"]*)"/g)].map(x=>x[1]);
}

// --- Уникальный 6-hex хэш (как в ядре: от времени создания) ---
function newHash(existing){
  let seed = Math.floor(Date.now()/1000) & 0xFFFFFF;
  for(let a=0;a<4096;a++){
    const h = ((seed+a)&0xFFFFFF).toString(16).padStart(6,"0");
    if(!existing.has(h)) return h;
  }
  return Math.random().toString(16).slice(2,8);
}
function sanitizeTitle(t){
  return t.replace(/[\\\/:*?"<>|]/g,"-").replace(/\s+/g," ").trim().slice(0,120);
}

// ===========================================================================
// GitHub API
// ===========================================================================
async function gh(path, opts={}){
  const r = await fetch("https://api.github.com"+path, {
    ...opts,
    headers:{ "Authorization":"Bearer "+cfg.token, "Accept":"application/vnd.github+json",
              "X-GitHub-Api-Version":"2022-11-28", ...(opts.headers||{}) }
  });
  if(!r.ok){ const b=await r.text(); throw new Error("GitHub "+r.status+": "+b.slice(0,140)); }
  return r.status===204 ? null : r.json();
}
const b64encode = s => btoa(unescape(encodeURIComponent(s)));
const b64decode = s => decodeURIComponent(escape(atob(s.replace(/\n/g,""))));

async function ghTree(){
  const d = await gh(`/repos/${cfg.repo}/git/trees/${encodeURIComponent(cfg.branch)}?recursive=1`);
  return d.tree || [];
}
async function ghGet(path){
  const d = await gh(`/repos/${cfg.repo}/contents/${path.split("/").map(encodeURIComponent).join("/")}?ref=${encodeURIComponent(cfg.branch)}`);
  return { text:b64decode(d.content), sha:d.sha };
}
async function ghPut(path, text, sha, msg){
  const body = { message:msg, content:b64encode(text), branch:cfg.branch };
  if(sha) body.sha = sha;
  return gh(`/repos/${cfg.repo}/contents/${path.split("/").map(encodeURIComponent).join("/")}`,
            { method:"PUT", body:JSON.stringify(body) });
}
async function ghDel(path, sha, msg){
  return gh(`/repos/${cfg.repo}/contents/${path.split("/").map(encodeURIComponent).join("/")}`,
            { method:"DELETE", body:JSON.stringify({ message:msg, sha, branch:cfg.branch }) });
}

// ===========================================================================
// Загрузка модели (Входящие = корень; поддиректория с _list.toml = список)
// ===========================================================================
async function loadModel(){
  showSpinner();
  let files;                 // [{path, name, dir, sha?}]
  let orderTexts = {};       // dir -> _list.toml text
  if(demo){
    files = mock.files.map(f=>({ path:f.path, name:f.path.split("/").pop(), dir:dirOf(f.path) }));
    for(const f of mock.files) if(f.path.endsWith("_list.toml")) orderTexts[dirOf(f.path)] = f.text;
  } else {
    const tree = await ghTree();
    files = tree.filter(t=>t.type==="blob" && t.path.endsWith(".toml"))
                .map(t=>({ path:t.path, name:t.path.split("/").pop(), dir:dirOf(t.path), sha:t.sha }));
    // _list.toml тексты нужны для order — тянем их (обычно немного).
    for(const f of files.filter(f=>f.name==="_list.toml")){
      try{ orderTexts[f.dir] = (await ghGet(f.path)).text; }catch(e){}
    }
  }
  // Сгруппировать по каталогу-списку. Корень "" = Входящие.
  const listDirs = new Set([""]);
  for(const f of files) if(f.name==="_list.toml") listDirs.add(f.dir);
  const lists = [...listDirs].map(dir=>{
    const name = dir==="" ? "Входящие" : dir.split("/").pop();
    const order = parseStringArray(orderTexts[dir]||"", "order");
    const all = [];
    for(const f of files){
      if(f.dir!==dir || f.name.startsWith("_")) continue;
      const p = parseTaskFilename(f.name);
      if(!p) continue;
      all.push({ ...p, path:f.path, sha:f.sha, children:[] });
    }
    // Дерево: задача-ребёнок ссылается на родителя последним хэшем в parents.
    const byHash = {};
    for(const t of all) byHash[t.hash] = t;
    const roots = [];
    for(const t of all){
      const par = t.parents.length ? byHash[t.parents[t.parents.length-1]] : null;
      if(par) par.children.push(t); else roots.push(t);
    }
    return { name, dir, order, roots, all };
  }).sort((a,b)=> a.dir==="" ? -1 : b.dir==="" ? 1 : a.name.localeCompare(b.name));

  const inbox = lists.findIndex(l=>l.dir==="");
  model = { lists, cur:{ list: inbox<0?0:inbox } };
  render();
  enrichAll();   // подтянуть метаданные всех списков (для умных списков)
}
function dirOf(path){ const i=path.lastIndexOf("/"); return i<0?"":path.slice(0,i); }

// ===========================================================================
// Рендер
// ===========================================================================
function showSpinner(){ $("#list-body").innerHTML=""; const s=el("div","spinner","Загрузка…"); $("#list-body").appendChild(s); }

// Сортировка уровня: выполненные вниз, затем по order (хэш), незнакомые — в хвост.
function sortLevel(arr, order){
  const oi = h => { const i=order.indexOf(h); return i<0?1e9:i; };
  arr.sort((a,b)=> (a.done-b.done) || (oi(a.hash)-oi(b.hash)));
}

const SMARTS = [["today","Сегодня"],["tomorrow","Завтра"],["flag","Флажки"],["all","Все"]];
function listOf(t){ return model.lists.find(L=>L.all.includes(t)); }
function computeSmart(key){
  const today=dateStr(0), tom=dateStr(1); const res=[];
  for(const L of model.lists) for(const t of L.all){
    const m=t.meta||{};
    if(key!=="all" && t.done) continue;
    if(key==="today"){ if(m.due && m.due<=today) res.push(t); }
    else if(key==="tomorrow"){ if(m.due===tom) res.push(t); }
    else if(key==="flag"){ if(m.flagged) res.push(t); }
    else res.push(t);
  }
  res.sort((a,b)=> (a.done-b.done) || ((a.meta&&a.meta.due||"~").localeCompare(b.meta&&b.meta.due||"~")));
  return res;
}

function render(){
  const cur = model.cur;
  const chips = $("#lists"); chips.innerHTML="";
  SMARTS.forEach(([k,name])=>{ const c=el("button","chip"+(cur.smart===k?" active":""),name);
    c.onclick=()=>{ model.cur={smart:k}; render(); }; chips.appendChild(c); });
  model.lists.forEach((l,idx)=>{ const c=el("button","chip"+(cur.list===idx?" active":""), l.name);
    c.onclick=()=>{ model.cur={list:idx}; render(); enrichList(l); }; chips.appendChild(c); });

  const body = $("#list-body"); body.innerHTML="";
  const ul = el("ul","tasks");

  if(cur.smart){
    $("#app-title").textContent = SMARTS.find(s=>s[0]===cur.smart)[1];
    const tasks = computeSmart(cur.smart);
    $("#app-count").textContent = tasks.filter(t=>!t.done).length;
    if(!tasks.length){ body.appendChild(el("div","empty","Нет задач")); return; }
    for(const t of tasks){
      const li = taskRow(t, 0);
      const L = listOf(t);
      if(L && L.dir!=="") li.querySelector(".name").appendChild(el("span","srclist"," · "+L.name));
      ul.appendChild(li);
    }
    body.appendChild(ul); return;
  }

  const L = model.lists[cur.list];
  $("#app-title").textContent = L.name;
  $("#app-count").textContent = L.all.filter(t=>!t.done).length;
  if(L.all.length===0){ body.appendChild(el("div","empty","Нет задач")); return; }
  const walk = (nodes, depth)=>{
    sortLevel(nodes, L.order);
    for(const t of nodes){ ul.appendChild(taskRow(t, depth)); walk(t.children, depth+1); }
  };
  walk(L.roots, 0);
  body.appendChild(ul);
}

function taskRow(t, depth){
  const li = el("li","task"+(t.done?" done":""));
  li.style.paddingLeft = (4 + depth*22) + "px";
  li.onclick = ()=> openDetail(t);
  const box = el("button","box"); box.onclick=(e)=>{ e.stopPropagation(); toggleDone(t); };
  const wrap = el("div","t");
  wrap.appendChild(el("div","name", t.title));
  if(t.meta){
    const m = el("div","meta");
    if(t.meta.flagged) m.appendChild(el("span","flag","⚑"));
    if(t.meta.priority) m.appendChild(el("span","prio","!".repeat(t.meta.priority)));
    if(t.meta.due) m.appendChild(el("span","due", t.meta.due));
    if(m.children.length) wrap.appendChild(m);
  }
  li.appendChild(box); li.appendChild(wrap);
  return li;
}

// Ленивая подгрузка полей задач (срок/приоритет/флаг) для списка — чанками,
// с прогрессивным ре-рендером. Тексты TOML в demo лежат в mock.
async function enrichList(L){
  if(L._enriched) return;
  L._enriched = true;
  const todo = L.all.filter(t=>!t.meta);
  for(let i=0;i<todo.length;i+=8){
    const chunk = todo.slice(i,i+8);
    await Promise.all(chunk.map(async t=>{
      try{
        const text = demo ? (mock.files.find(f=>f.path===t.path)?.text||"")
                          : (await ghGet(t.path)).text;
        t.meta = parseTaskToml(text);
      }catch(e){ t.meta = { due:null, priority:0, flagged:false }; }
    }));
    render();   // прогрессивно (в т.ч. умные списки наполняются по мере загрузки)
  }
}
async function enrichAll(){ for(const L of model.lists) await enrichList(L); }

// ===========================================================================
// Действия: выполнить/снять (переименование ~) и добавить задачу
// ===========================================================================
async function toggleDone(t){
  const base = t.path.slice(0, t.path.length - (t.path.split("/").pop().length)); // dir + "/"
  const oldName = t.path.split("/").pop();
  const newName = t.done ? oldName.replace(/^~/,"") : "~"+oldName;
  const newPath = base + newName;
  t.done = !t.done; render();  // оптимистично
  try{
    if(demo){
      const f = mock.files.find(f=>f.path===t.path); f.path=newPath; t.path=newPath;
    } else {
      const cur = await ghGet(t.path);
      await ghPut(newPath, cur.text, null, (t.done?"Done: ":"Undone: ")+t.title);
      await ghDel(t.path, cur.sha, "move "+oldName);
      t.path=newPath; t.sha=undefined;
    }
  }catch(e){ t.done=!t.done; render(); toast("Ошибка: "+e.message); }
}

async function addTask(title){
  title = sanitizeTitle(title);
  if(!title) return;
  // В умном списке добавляем во «Входящие»; иначе — в текущий список.
  const L = model.cur.list!=null ? model.lists[model.cur.list]
                                 : (model.lists.find(x=>x.dir==="") || model.lists[0]);
  const existing = new Set(L.all.map(t=>t.hash));
  const hash = newHash(existing);
  const fname = `${hash}_${title}.toml`;
  const path = (L.dir? L.dir+"/":"") + fname;
  const task = { done:false, parents:[], hash, title, path, children:[],
                 meta:{ due:null, priority:0, flagged:false } };
  L.all.push(task); L.roots.unshift(task); render();   // оптимистично
  try{
    if(demo){ mock.files.push({ path, text:"" }); }
    else { await ghPut(path, "", null, "Add: "+title); }
    toast("Добавлено");
  }catch(e){
    L.all=L.all.filter(x=>x!==task); L.roots=L.roots.filter(x=>x!==task);
    render(); toast("Ошибка: "+e.message);
  }
}

// ===========================================================================
// Экран задачи: правка полей TOML (срок/приоритет/флаг), переименование, удаление
// ===========================================================================
let detailTask = null;
const dateStr = (offset) => { const d=new Date(); d.setDate(d.getDate()+offset);
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); };

// Построчный редактор TOML: правит известный ключ, чужие строки/комментарии
// сохраняет (совместимо с toml.c). value=null удаляет ключ.
function tomlSet(text, key, value){
  const lines = (text||"").split(/\r?\n/);
  const re = new RegExp("^\\s*"+key+"\\s*=");
  const out = []; let handled = false;
  for(const line of lines){
    if(!handled && re.test(line)){ handled=true; if(value!=null) out.push(key+" = "+value); }
    else out.push(line);
  }
  if(!handled && value!=null){
    let i = out.findIndex(l=>/^\s*\[/.test(l));           // перед [[comment]] и т.п.
    if(i<0){ while(out.length && out[out.length-1].trim()==="") out.pop(); i=out.length; }
    out.splice(i,0,key+" = "+value);
  }
  let s = out.join("\n").replace(/\n{3,}/g,"\n\n");
  if(s && !s.endsWith("\n")) s += "\n";
  return s;
}

async function openDetail(t){
  detailTask = t;
  $("#overlay").classList.add("show"); $("#sheet").classList.add("show");
  if(!t.meta){                        // подтянуть текущие поля, если ещё не загружены
    try{
      const text = demo ? (mock.files.find(f=>f.path===t.path)?.text||"") : (await ghGet(t.path)).text;
      t.meta = parseTaskToml(text);
    }catch(e){ t.meta = { due:null, priority:0, flagged:false }; }
  }
  if(detailTask===t) renderDetail();
}
function closeDetail(){ detailTask=null; $("#overlay").classList.remove("show"); $("#sheet").classList.remove("show"); }
function renderDetail(){
  const t = detailTask; if(!t) return;
  $("#d-title").value = t.title;
  const m = t.meta || {};
  [...$("#d-prio").children].forEach(b=> b.classList.toggle("on", (m.priority||0)===+b.dataset.v));
  $("#d-flag").classList.toggle("on", !!m.flagged);
  $("#d-date").value = m.due || "";
}

async function writeToml(t, key, value){
  try{
    if(demo){ const f=mock.files.find(f=>f.path===t.path); if(f) f.text = tomlSet(f.text, key, value); }
    else { const cur = await ghGet(t.path); await ghPut(t.path, tomlSet(cur.text,key,value), cur.sha, "Edit: "+t.title); }
  }catch(e){ toast("Ошибка: "+e.message); }
}
function setPriority(v){ const t=detailTask; if(!t)return; t.meta.priority=v; renderDetail(); render(); writeToml(t,"priority", v?String(v):null); }
function setFlag(){ const t=detailTask; if(!t)return; t.meta.flagged=!t.meta.flagged; renderDetail(); render(); writeToml(t,"flagged", t.meta.flagged?"true":null); }
function setDue(v){ const t=detailTask; if(!t)return; t.meta.due=v||null; renderDetail(); render(); writeToml(t,"due", v||null); }

async function renameTask(newTitle){
  const t=detailTask; if(!t) return;
  newTitle = sanitizeTitle(newTitle);
  if(!newTitle || newTitle===t.title){ if(t) $("#d-title").value=t.title; return; }
  const dir = dirOf(t.path), base = dir?dir+"/":"";
  const prefix = (t.done?"~":"") + [...t.parents, t.hash].join("_") + "_";
  const oldPath = t.path, newPath = base + prefix + newTitle + ".toml";
  t.title = newTitle; t.path = newPath; render();
  try{
    if(demo){ const f=mock.files.find(f=>f.path===oldPath); if(f) f.path=newPath; }
    else { const cur=await ghGet(oldPath); await ghPut(newPath,cur.text,null,"Rename: "+newTitle); await ghDel(oldPath,cur.sha,"rename"); }
  }catch(e){ toast("Ошибка: "+e.message); }
}

async function deleteTask(){
  const t=detailTask; if(!t) return;
  const L = listOf(t) || model.lists[0];
  const subtree=[]; (function collect(n){ subtree.push(n); n.children.forEach(collect); })(t);
  const rm = new Set(subtree);
  L.all = L.all.filter(x=>!rm.has(x));
  L.roots = L.roots.filter(x=>!rm.has(x));
  for(const x of L.all) x.children = x.children.filter(c=>!rm.has(c));
  closeDetail(); render();
  try{
    for(const n of subtree){
      const trashPath = "trash/"+n.path.split("/").pop();
      if(demo){ const f=mock.files.find(f=>f.path===n.path); if(f) f.path=trashPath; }
      else { const cur=await ghGet(n.path); await ghPut(trashPath,cur.text,null,"Trash: "+n.title); await ghDel(n.path,cur.sha,"trash"); }
    }
    toast("В корзину");
  }catch(e){ toast("Ошибка: "+e.message); }
}

// ===========================================================================
// Подключение / demo / роутинг
// ===========================================================================
function showApp(){
  $("#connect").classList.add("hidden");
  $("#app").classList.remove("hidden");
  $("#addbar").classList.remove("hidden");
}
function showConnect(){
  $("#connect").classList.remove("hidden");
  $("#app").classList.add("hidden");
  $("#addbar").classList.add("hidden");
}

async function connect(){
  const repo = $("#in-repo").value.trim();
  const branch = $("#in-branch").value.trim() || "main";
  const token = $("#in-token").value.trim();
  if(!repo || !token){ $("#connect-err").textContent="Заполни репозиторий и токен."; return; }
  cfg = { repo, branch, token }; demo=false;
  try{
    await gh(`/repos/${repo}`);           // проверка доступа
    localStorage.setItem(LS, JSON.stringify(cfg));
    showApp(); await loadModel();
  }catch(e){
    let msg = e.message;
    if(/GitHub 401/.test(msg)) msg = "Неверный или просроченный токен.";
    else if(/GitHub 403/.test(msg)) msg = "Токену не хватает прав: нужен доступ Contents (read/write) именно к этому репозиторию.";
    else if(/GitHub 404/.test(msg)) msg = "Репозиторий не найден. Проверь строку owner/repo и что токен создан в аккаунте-владельце репо.";
    $("#connect-err").textContent = msg; cfg=null;
  }
}

function startDemo(){
  demo=true; cfg={ repo:"demo/demo", branch:"main" };
  mock = { files:[
    { path:"_list.toml", text:'order = ["a10001","a10002","a10003"]\n' },
    { path:"a10001_Купить продукты.toml", text:"priority = 2\nflagged = true\n" },
    { path:"a10001_c30001_Хлеб.toml", text:"" },
    { path:"a10001_c30002_Молоко.toml", text:"priority = 1\n" },
    { path:"~a10001_c30003_Яйца.toml", text:"" },
    { path:"a10002_Позвонить врачу.toml", text:'due = 2026-07-25\n' },
    { path:"~a10003_Оплатить счёт.toml", text:"" },
    { path:"Работа/_list.toml", text:'order = ["b20001","b20002"]\n' },
    { path:"Работа/b20001_Отчёт за квартал.toml", text:"priority = 3\n" },
    { path:"Работа/b20002_Ревью PR.toml", text:"" },
  ]};
  showApp(); loadModel();
}

function logout(){ localStorage.removeItem(LS); cfg=null; demo=false; model=null; showConnect(); }

// События
$("#btn-connect").onclick = connect;
$("#btn-demo").onclick = startDemo;
$("#btn-refresh").onclick = ()=> loadModel().catch(e=>toast(e.message));
$("#btn-logout").onclick = logout;
const addIn = $("#add-input"), addBtn = $("#add-btn");
addIn.addEventListener("input", ()=> addBtn.disabled = !addIn.value.trim());
addBtn.onclick = ()=>{ const v=addIn.value; addIn.value=""; addBtn.disabled=true; addTask(v); };
addIn.addEventListener("keydown", e=>{ if(e.key==="Enter" && addIn.value.trim()){ const v=addIn.value; addIn.value=""; addBtn.disabled=true; addTask(v); } });

// Лист задачи
$("#overlay").onclick = closeDetail;
$("#d-prio").addEventListener("click", e=>{ const b=e.target.closest("button"); if(b) setPriority(+b.dataset.v); });
$("#d-flag").onclick = setFlag;
$("#d-due").addEventListener("click", e=>{ const b=e.target.closest("button"); if(!b)return;
  const d=+b.dataset.d; setDue(d<0?null:dateStr(d)); });
$("#d-date").addEventListener("change", e=> setDue(e.target.value||null));
$("#d-del").onclick = deleteTask;
$("#d-title").addEventListener("keydown", e=>{ if(e.key==="Enter"){ e.target.blur(); } });
$("#d-title").addEventListener("blur", e=> renameTask(e.target.value));

// Автовосстановление сессии
(function init(){
  const saved = localStorage.getItem(LS);
  if(saved){ try{ cfg=JSON.parse(saved); if(cfg.token){ showApp(); loadModel().catch(e=>{ toast(e.message); showConnect(); }); return; } }catch(e){} }
  showConnect();
})();

if("serviceWorker" in navigator){ navigator.serviceWorker.register("sw.js").catch(()=>{}); }
